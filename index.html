<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/Soto_White_tab_icon.png"
    />
    <title>Soto Coffee</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body {
        font-family: "Karla", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #e2e2dd;
      }
      .container {
        text-align: center;
      }
      .logo img {
        width: 6cm;
        height: 3cm;
      }
      .slogan {
        margin: 24px 0;
        font-size: 20px;
        color: #333;
        /* display: flex; */
        justify-content: center;
        align-items: center;
      }
      .animation {
        width: 30px; /* Adjust based on the size of your GIF */
        height: auto;
        vertical-align: -3px;
      }
      .address {
        font-size: 20px;
        color: #333;
      }
      .phone {
        font-size: 16px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="images/Soto_Black_Logo.png" alt="Soto Coffee Logo" />
      </div>
      <div class="slogan">
        good things are brewing...
        <img src="icons/jumping-coffee.gif" alt="Waiting" class="animation" />
      </div>
      <div class="address">323 CALEDONIAN ROAD<br />LONDON N1 1DR</div>
    </div>
  </body>
</html>
